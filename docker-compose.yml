version: "3.9"

services:
  fastapi:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - MCP_SERVER_URL=http://mcp:8090
    depends_on:
      - mcp

  mcp:
    build: .
    command: python -m mcp.mcp_server
    ports:
      - "8090:8090"
    env_file: .env
    environment:
      - MCP_SERVER_PORT=8090
