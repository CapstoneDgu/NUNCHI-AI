startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      apiKey:
        type: string
        description: "NUNCHI 키오스크 MCP 서버 접근 키 (관리자에게 문의)"
      springBaseUrl:
        type: string
        description: "Spring 백엔드 URL"
        default: "http://43.201.20.11:8080"
      springTimeout:
        type: number
        description: "Spring API 호출 타임아웃 (초)"
        default: 5
    required:
      - apiKey
  commandFunction: |-
    (config) => ({
      command: "python",
      args: ["-m", "kiosk_mcp.mcp_server"],
      env: {
        MCP_TRANSPORT: "stdio",
        MCP_API_KEY: config.apiKey,
        MCP_API_KEY_PROVIDED: config.apiKey,
        SPRING_BASE_URL: config.springBaseUrl || "http://43.201.20.11:8080",
        SPRING_TIMEOUT: String(config.springTimeout || 5)
      }
    })
